    <link rel="stylesheet"

<header>
    <div class="logo">EI House</div>

<section class="contact">
    <h1>Contact EI House</h1>

    <div class="contact-box">

        <!-- WhatsApp -->
        <div class="contact-card">
            <h3><i class="fa-brands fa-whatsapp"></i> WhatsApp Us</h3>
            <p>Chat directly with our support team</p>
            <a href="https://wa.me/919876543210" target="_blank">
                <button class="whatsapp">Chat on WhatsApp</button>
            </a>
        </div>

        <!-- Email -->
        <div class="contact-card">
            <h3><i class="fa-solid fa-envelope"></i> Email Us</h3>
            <p>Send us your enquiry</p>
            <a href="mailto:info@elemanindia.com">
                <button class="email">Send Email</button>
            </a>
        </div>

        <!-- Location -->
        <div class="contact-card">
            <h3><i class="fa-solid fa-location-dot"></i> Visit Our Office</h3>
            <p>Mumbai, Maharashtra, India</p>
            <a href="https://maps.google.com" target="_blank">
                <button class="location">View Location</button>
            </a>
        </div>

    </div>
</section>
